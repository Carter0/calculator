<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>Calculator</title>
</head>

<body>

    <div class="container">
        <p id="display"> Display </p>

        <div class="buttons">
            <div class="operators">
                <button>+</button>
                <button>-</button>
                <button>&times;</button>
                <button>/</button>
            </div>

            <div class="container-a">
                <div class="digits">
                    <button>0</button>
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                </div>

                <div class="container-b">
                    <button id="equalsButton">=</button>
                    <button id="clearButton">clear</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
